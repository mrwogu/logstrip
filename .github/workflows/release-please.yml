name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest

    steps:
      - name: Create or update release PR
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          publish: true

      - name: Checkout release tag
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js for npm
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for OIDC trusted publishing
        if: ${{ steps.release.outputs.release_created }}
        run: |
          npm install -g npm@latest
          npm --version

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: npm ci

      - name: Verify release build
        if: ${{ steps.release.outputs.release_created }}
        run: |
          npm run typecheck
          npm run test:coverage
          npm run build
          npm audit

      - name: Commit dist/ into release tag
        if: ${{ steps.release.outputs.release_created }}
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/
          git commit -m "chore: rebuild dist/ for ${TAG_NAME}"
          git tag -f "${TAG_NAME}" HEAD
          git push origin "refs/tags/${TAG_NAME}" --force

      - name: Update major action tag
        if: ${{ steps.release.outputs.release_created }}
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          MAJOR_TAG=$(node -e "const tag = process.env.TAG_NAME; const match = /^v(\\d+)\\./.exec(tag); if (!match) process.exit(1); console.log('v' + match[1]);")
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$MAJOR_TAG" HEAD
          git push origin "refs/tags/$MAJOR_TAG" --force

      - name: Publish to npm
        if: ${{ steps.release.outputs.release_created }}
        run: npm publish
